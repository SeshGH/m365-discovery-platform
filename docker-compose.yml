# docker-compose.yml — dev/demo stack for m365-discovery-platform
#
# Usage:
#   cp docker.env.example .env.docker        # fill in GRAPH_CLIENT_ID / GRAPH_CLIENT_SECRET
#   docker compose --env-file .env.docker up --build
#
# Portal: http://localhost:3000
# MinIO console: http://localhost:9001  (minioadmin / minioadmin)
#
# NOTE: this file intentionally does NOT read the repo-root .env so that
# local dev credentials are never accidentally used inside containers.
# All secrets are supplied via --env-file .env.docker on the CLI.

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: m365discovery
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d m365discovery"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-compatible artefact storage) ───────────────────────────────────
  # No healthcheck: the minio/minio image does not ship curl/wget.
  # minio-init uses restart: on-failure to retry until MinIO is accepting connections.
  # api/worker only touch MinIO when processing jobs, not at startup.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # ── MinIO bucket initialisation (runs once then exits) ───────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/artefacts &&
        echo 'Bucket ready.'
      "

  # ── Fastify API ──────────────────────────────────────────────────────────────
  # Runs prisma migrate deploy before starting so the schema is always current.
  # Portal → API auth uses PORTAL_INTERNAL_JWT_SECRET + PORTAL_DEV_ORG_ID.
  # There is no PORTAL_BACKEND_BEARER_TOKEN in this codebase.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "
        node_modules/.bin/prisma migrate deploy
          --schema packages/db/prisma/schema.prisma &&
        pnpm --filter @acme/api dev
      "
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/m365discovery
      PORTAL_INTERNAL_JWT_SECRET: ${PORTAL_INTERNAL_JWT_SECRET}
      PORTAL_DEV_ORG_ID: ${PORTAL_DEV_ORG_ID}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: artefacts
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: us-east-1
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - .:/app
      - /app/node_modules

  # ── Worker ───────────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: pnpm --filter @acme/worker dev
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/m365discovery
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: artefacts
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: us-east-1
      GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET}
      POLL_MS: 2000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - .:/app
      - /app/node_modules

  # ── Next.js Portal ───────────────────────────────────────────────────────────
  # cd into the app directory so Next.js resolves next.config, tsconfig, etc.
  # from the correct root. pnpm dev runs the portal's own dev script; the extra
  # -- --hostname 0.0.0.0 arg is forwarded to `next dev` so the dev server
  # binds to all interfaces and is reachable from outside the container.
  portal:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: sh -c "cd apps/portal && pnpm dev -- --hostname 0.0.0.0"
    environment:
      # Server-side: Next.js route handlers proxy to the Fastify API.
      # Container-to-container; the docker service name resolves correctly.
      PORTAL_API_BASE_URL: http://api:8080
      PORTAL_INTERNAL_JWT_SECRET: ${PORTAL_INTERNAL_JWT_SECRET}
      PORTAL_DEV_ORG_ID: ${PORTAL_DEV_ORG_ID}
      # Public: used by the browser to construct the admin consent URL.
      NEXT_PUBLIC_GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID}
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/node_modules
      # Isolate Next.js incremental build cache inside the container so it
      # does not conflict with any local .next directory on the host.
      - /app/apps/portal/.next

volumes:
  pgdata:
  miniodata:
