# docker-compose.yml — dev/demo stack for m365-discovery-platform
#
# Usage:
#   cp docker.env.example .env.docker       # fill in secrets
#   docker compose --env-file .env.docker up --build
#
# Portal: http://localhost:3000
# MinIO console: http://localhost:9001
#   Credentials come from MINIO_ROOT_USER / MINIO_ROOT_PASSWORD in .env.docker
#   (defaults when no --env-file: dev-minio-user / dev-minio-password)
#
# NOTE: this file does NOT read the repo-root .env.
# All secrets are supplied via --env-file .env.docker on the CLI.
#
# Source code is baked into the image via COPY . . during --build.
# No bind mounts are used: this avoids Windows symlink issues with
# pnpm's node_modules layout overwriting container-installed deps.
# Re-run with --build to pick up source changes.
#
# Multi-worker support
# --------------------
# Two worker services (worker-1 and worker-2) are defined below.
# Both share identical configuration and the same image build.
# Concurrency safety is enforced by the DB-level atomic claim in the worker:
# each job's status is updated from "queued" → "running" in a single
# updateMany with a precise WHERE guard; only the worker that wins the DB
# update proceeds — the other sees locked.count=0 and skips the job.
# It is safe to run both, either, or neither worker at any time.
# To run only one worker: docker compose --env-file .env.docker up --build worker-1 api postgres minio portal

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: m365discovery
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d m365discovery"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dev-minio-user}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dev-minio-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-dev-minio-user} ${MINIO_ROOT_PASSWORD:-dev-minio-password} &&
        mc mb --ignore-existing local/artefacts &&
        echo 'Bucket ready.'
      "

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: sh -c "node_modules/.bin/prisma migrate deploy --schema packages/db/prisma/schema.prisma && pnpm --filter @acme/api dev"
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/m365discovery
      PORTAL_INTERNAL_JWT_SECRET: ${PORTAL_INTERNAL_JWT_SECRET}
      PORTAL_DEV_ORG_ID: ${PORTAL_DEV_ORG_ID}
      S3_ENDPOINT: http://minio:9000
      # S3_PUBLIC_ENDPOINT is the browser-reachable MinIO URL.
      # Presigned download URLs use this host so the browser can resolve them.
      # In Docker dev, MinIO port 9000 is mapped to the host, so localhost:9000 works.
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-dev-minio-user}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-dev-minio-password}
      S3_BUCKET: artefacts
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: us-east-1
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  worker-1:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: pnpm --filter @acme/worker dev
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/m365discovery
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-dev-minio-user}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-dev-minio-password}
      S3_BUCKET: artefacts
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: us-east-1
      GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET}
      POLL_MS: 2000
      WORKER_NAME: worker-1
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  worker-2:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: pnpm --filter @acme/worker dev
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/m365discovery
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-dev-minio-user}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-dev-minio-password}
      S3_BUCKET: artefacts
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: us-east-1
      GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET}
      POLL_MS: 2000
      WORKER_NAME: worker-2
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  portal:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: sh -c "cd apps/portal && node_modules/.bin/next dev -p 3000 -H 0.0.0.0"
    environment:
      PORTAL_API_BASE_URL: http://api:8080
      PORTAL_INTERNAL_JWT_SECRET: ${PORTAL_INTERNAL_JWT_SECRET}
      PORTAL_DEV_ORG_ID: ${PORTAL_DEV_ORG_ID}
      NEXT_PUBLIC_GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
