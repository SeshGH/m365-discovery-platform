# docker-compose.yml — dev/demo stack for m365-discovery-platform
#
# Usage:
#   cp .env.docker.example .env.docker       # fill in secrets
#   docker compose --env-file .env.docker up --build
#
# Portal: http://localhost:3000
# MinIO console: http://localhost:9001  (minioadmin / minioadmin)
#
# NOTE: this file does NOT read the repo-root .env.
# All secrets are supplied via --env-file .env.docker on the CLI.
#
# Source code is baked into the image via COPY . . during --build.
# No bind mounts are used: this avoids Windows symlink issues with
# pnpm's node_modules layout overwriting container-installed deps.
# Re-run with --build to pick up source changes.

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: m365discovery
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d m365discovery"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/artefacts &&
        echo 'Bucket ready.'
      "

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: sh -c "node_modules/.bin/prisma migrate deploy --schema packages/db/prisma/schema.prisma && pnpm --filter @acme/api dev"
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/m365discovery
      PORTAL_INTERNAL_JWT_SECRET: ${PORTAL_INTERNAL_JWT_SECRET}
      PORTAL_DEV_ORG_ID: ${PORTAL_DEV_ORG_ID}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: artefacts
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: us-east-1
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: pnpm --filter @acme/worker dev
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/m365discovery
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: artefacts
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: us-east-1
      GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET}
      POLL_MS: 2000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  portal:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: sh -c "cd apps/portal && node_modules/.bin/next dev -p 3000 -H 0.0.0.0"
    environment:
      PORTAL_API_BASE_URL: http://api:8080
      PORTAL_INTERNAL_JWT_SECRET: ${PORTAL_INTERNAL_JWT_SECRET}
      PORTAL_DEV_ORG_ID: ${PORTAL_DEV_ORG_ID}
      NEXT_PUBLIC_GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
